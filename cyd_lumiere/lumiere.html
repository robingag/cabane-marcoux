<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bouton et Lumière</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }

        .light {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #333;
            border: 4px solid #555;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .light.on {
            background: #ffdd00;
            box-shadow: 0 0 60px #ffdd00, 0 0 120px #ffaa00;
            border-color: #ffaa00;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #c73650;
        }
    </style>
</head>
<body>
    <div class="light" id="light"></div>
    <button onclick="document.getElementById('light').classList.toggle('on')">ON / OFF</button>
</body>
</html>
