<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080a0e">
<title>Cabane Marcoux — Tablette</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#080a0e;color:#c8d4e0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.hdr{background:#0d1520;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #f59e0b;flex-shrink:0}
.hdr h1{font-size:18px;letter-spacing:3px;font-weight:700;color:#f1f5f9;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:12px;font-size:12px;color:#64748b}
.dot{width:10px;height:10px;border-radius:50%;background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.6)}
.dot.ok{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.7)}
.top{display:flex;gap:12px;padding:10px 12px;flex-shrink:0}
.card{flex:1;background:#0d1520;border:1px solid #1a2840;border-radius:10px;padding:12px;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.card:nth-child(1)::before{background:linear-gradient(90deg,#f59e0b,#d97706)}
.card:nth-child(2)::before{background:linear-gradient(90deg,#06b6d4,#0891b2)}
.card-lbl{font-size:10px;letter-spacing:2px;color:#64748b;text-transform:uppercase;margin-bottom:4px}
.card-val{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums}
.card-val.gold{color:#f59e0b}
.card-val.cyan{color:#06b6d4}
.card-sub{font-size:18px;color:#4ade80;margin-top:2px;font-variant-numeric:tabular-nums}
.basins{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 12px 12px;flex:1;min-height:0}
.basin{background:#0d1520;border:1px solid #1a2840;border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden}
.basin::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0}
.basin:nth-child(1)::before{background:#3b82f6}
.basin:nth-child(2)::before{background:#f59e0b}
.basin:nth-child(3)::before{background:#8b5cf6}
.basin:nth-child(4)::before{background:#10b981}
.bn{font-size:13px;letter-spacing:2px;color:#94a3b8;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.tw{flex:1;width:100%;max-width:110px;display:flex;flex-direction:column;align-items:center;min-height:0}
.tank{width:100%;flex:1;background:#0a0f18;border:2px solid #1e2d40;border-radius:8px;position:relative;overflow:hidden;min-height:60px}
.fill{position:absolute;bottom:0;width:100%;transition:height .5s ease;border-radius:0 0 6px 6px}
.fill.l{background:linear-gradient(180deg,#22c55e,#16a34a)}
.fill.m{background:linear-gradient(180deg,#eab308,#ca8a04)}
.fill.h{background:linear-gradient(180deg,#ef4444,#dc2626)}
.bv{margin-top:8px;font-size:26px;font-weight:700;color:#e2e8f0;font-variant-numeric:tabular-nums}
.bu{font-size:12px;color:#64748b}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(239,68,68,0)}50%{box-shadow:0 0 16px rgba(239,68,68,.5)}}
.basin.alert{animation:pulse 1.5s infinite;border-color:#ef4444}
</style></head>
<body>
<div class="hdr">
  <h1>&#127809; Cabane Marcoux</h1>
  <div class="hdr-r"><span id="clk">--:--</span><div class="dot" id="dot"></div></div>
</div>
<div class="top">
  <div class="card">
    <div class="card-lbl">Dompeur &mdash; Dernier cycle</div>
    <div class="card-val gold" id="dmp">--:--</div>
    <div class="card-sub" id="el">--:--</div>
  </div>
  <div class="card">
    <div class="card-lbl">Temp&eacute;rature ext&eacute;rieure</div>
    <div class="card-val cyan" id="tmp">-- &deg;C</div>
  </div>
</div>
<div class="basins">
  <div class="basin" id="b1"><div class="bn">Eau</div><div class="tw"><div class="tank"><div class="fill l" id="f1" style="height:0%"></div></div></div><div class="bv"><span id="v1">--</span> <span class="bu" id="u1"></span></div></div>
  <div class="basin" id="b2"><div class="bn">Concentr&eacute;</div><div class="tw"><div class="tank"><div class="fill l" id="f2" style="height:0%"></div></div></div><div class="bv"><span id="v2">--</span> <span class="bu" id="u2"></span></div></div>
  <div class="basin" id="b3"><div class="bn">R&eacute;serve</div><div class="tw"><div class="tank"><div class="fill l" id="f3" style="height:0%"></div></div></div><div class="bv"><span id="v3">--</span> <span class="bu" id="u3"></span></div></div>
  <div class="basin" id="b4"><div class="bn">Perm&eacute;at</div><div class="tw"><div class="tank"><div class="fill l" id="f4" style="height:0%"></div></div></div><div class="bv"><span id="v4">--</span> <span class="bu" id="u4"></span></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>
<script>
var id="5ea48c",p="cyd/"+id+"/";
var rawBasin={1:0,2:0,3:0,4:0},calData={},basinMax={1:42,2:23,3:42,4:34};
// Elapsed timer — recalé par MQTT, compte localement en autonomie
var elBase=0,elAt=0,elAlive=false;
setInterval(function(){
  var d=new Date();
  document.getElementById("clk").textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  if(elAlive){
    var s=elBase+Math.floor((Date.now()-elAt)/1000);
    document.getElementById("el").textContent=fmt(s);
  }
},1000);
document.getElementById("clk").textContent=new Date().toTimeString().slice(0,5);

function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}

function rawToInches(n,raw){
  var cal=calData[n];if(!cal||raw<=0)return null;
  var val=cal.refInches+(cal.refRaw-raw)/2.54;
  return val<0?0:val;
}

function upB(n,pct){
  var f=document.getElementById("f"+n);
  if(pct<0)pct=0;if(pct>100)pct=100;
  f.style.height=pct+"%";
  f.className="fill "+(pct>=90?"h":pct>=61?"m":"l");
  var b=document.getElementById("b"+n);
  var po=rawToInches(n,rawBasin[n]);
  if(pct>=90)b.classList.add("alert");else b.classList.remove("alert");
  var v=document.getElementById("v"+n),u=document.getElementById("u"+n);
  if(po!==null&&po>=0){v.textContent=Math.round(po);u.textContent="po";}
  else{v.textContent="--";u.textContent="";}
}

function refresh(n){
  var po=rawToInches(n,rawBasin[n]);
  var pct=0;
  if(po!==null&&basinMax[n]>0){pct=Math.round(po/basinMax[n]*100);}
  upB(n,pct);
}

var c=mqtt.connect("wss://broker.hivemq.com:8884/mqtt",{clientId:"tab-"+id+"-"+Math.random().toString(16).substr(2,4),clean:true,reconnectPeriod:5000});
c.on("connect",function(){
  document.getElementById("dot").classList.add("ok");
  ["basin1/raw","basin2/raw","basin3/raw","basin4/raw",
   "basin1/cal","basin2/cal","basin3/cal","basin4/cal",
   "temp","dompeur","dompeur/elapsed","settings/bmax"].forEach(function(t){c.subscribe(p+t);});
});
c.on("offline",function(){document.getElementById("dot").classList.remove("ok");});
c.on("message",function(tp,m){
  var v=m.toString();
  if(tp===p+"temp"){document.getElementById("tmp").textContent=(+v).toFixed(1)+" \u00b0C";}
  if(tp===p+"dompeur"){document.getElementById("dmp").textContent=v;}
  if(tp===p+"dompeur/elapsed"){
    var sec=parseInt(v)||0;
    elBase=sec;elAt=Date.now();elAlive=true;
    document.getElementById("el").textContent=fmt(sec);
  }
  if(tp===p+"settings/bmax"){try{basinMax=JSON.parse(v);}catch(e){}}
  for(var n=1;n<=4;n++){
    if(tp===p+"basin"+n+"/cal"){try{calData[n]=JSON.parse(v);refresh(n);}catch(e){}}
    if(tp===p+"basin"+n+"/raw"){rawBasin[n]=parseInt(v)||0;refresh(n);}
  }
});
</script></body></html>
