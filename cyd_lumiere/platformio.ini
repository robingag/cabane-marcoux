[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM6
monitor_port = COM6
monitor_speed = 115200

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    knolleary/PubSubClient@^2.8
    ricmoo/QRCode@^0.0.1
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; CYD ESP32-2432S028R TFT pins
    -DTFT_MOSI=13
    -DTFT_MISO=12
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    ; CYD Touch pins (XPT2046 on separate SPI)
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DUSE_HSPI_PORT=1
    ; Fonts - explicitly load
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
