<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0a0a1a">
<title>Cabane Marcoux</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0a0a1a;color:#fff;user-select:none}
.hd{background:#0a3d7a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.hd h1{font-size:16px;letter-spacing:1px}
.dt{width:8px;height:8px;border-radius:50%;background:#f44}.dt.ok{background:#4f4}.dt.w{background:#ff4}
.hd-right{display:flex;align-items:center;gap:12px}
.mn-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 6px;line-height:1;opacity:.85}
.mn-btn:active{opacity:1}
.mn-panel{background:#071428;border-bottom:2px solid #1a3a6a;padding:0 16px;text-align:center;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease}
.mn-panel.open{max-height:320px;padding:20px 16px}
.mn-title{font-size:11px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.mn-qr{display:inline-block;background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
.mn-qr img{display:block;width:160px;height:160px}
.mn-url{font-size:10px;color:#556;word-break:break-all;max-width:280px;margin:0 auto}
.w{max-width:460px;margin:0 auto;padding:10px}
.r{display:flex;gap:8px;margin-bottom:8px}
.cd{background:#1a1a2e;border:1px solid #2a2a4e;border-radius:8px;padding:12px;flex:1}
.cd .lb{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.cd .vl{font-family:monospace;font-size:24px;font-weight:700;text-align:center}
.cd.dm .vl{color:#0ff}.cd.tp .vl{color:#fd20}
.gc{background:#1a1a2e;border:1px solid #2a2a4e;border-radius:8px;padding:8px;margin-bottom:8px}
.gc .gl{font-size:10px;color:#0ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between}
.gc .ar{font-size:14px;font-weight:700}.gc .ar.u{color:#f44}.gc .ar.d{color:#4f4}
.gc canvas{width:100%;height:90px;display:block;border-radius:4px}
.bc{background:#1a1a2e;border:1px solid #2a2a4e;border-radius:8px;padding:12px 16px;margin-bottom:8px}
.br{display:flex;align-items:center;gap:10px;margin-bottom:10px}.br:last-child{margin:0}
.br .nl{font-size:14px;color:#6bf;width:68px;font-weight:700}.br .bw{flex:1;background:#111;border-radius:5px;height:22px;overflow:hidden}
.br .bf{height:100%;border-radius:5px;transition:width .5s}.bf.h{background:#f44}.bf.m{background:#ff4}.bf.l{background:#4f4}
.br .pc{font-family:monospace;font-size:15px;width:40px;text-align:right;font-weight:700}
.sl-wrap{margin-bottom:8px}
.sl-track{position:relative;height:56px;border-radius:28px;border:2px solid #0a4dd9;background:#07122e;overflow:hidden;touch-action:none}
.sl-track.on{border-color:#e94560;background:#1a0814}
.sl-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;letter-spacing:1px;pointer-events:none;transition:opacity .3s}
.sl-hint.l{left:62px;color:#4af}.sl-track.on .sl-hint.l{opacity:0}
.sl-hint.r{right:62px;color:#e94560;opacity:0}.sl-track.on .sl-hint.r{opacity:1}
.sl-hdl{position:absolute;top:4px;width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:grab;touch-action:none}
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center}
.pin-ov.show{display:flex}
.pin-box{background:#0d1929;border:1px solid #1a3a6a;border-radius:16px;padding:24px 20px;width:260px;text-align:center}
.pin-ttl{font-size:11px;color:#0ff;text-transform:uppercase;letter-spacing:2px;margin-bottom:18px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:14px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #2a4a7a;background:none;transition:all .15s}
.pin-dot.f{background:#0ff;border-color:#0ff;box-shadow:0 0 8px #0ff4}
.pin-err{color:#f44;font-size:12px;min-height:18px;margin-bottom:10px}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pk{background:#162040;border:none;color:#fff;font-size:20px;font-weight:700;padding:14px;border-radius:8px;cursor:pointer}
.pk:active{background:#253a6a}
.pk.del{background:#0d1929;color:#f84;font-size:14px}
.pk.mt{background:none;cursor:default}
.pin-cancel{background:none;border:1px solid #1a3a6a;color:#556;font-size:13px;padding:8px 20px;border-radius:8px;cursor:pointer;width:100%}
.pin-cancel:active{border-color:#2a4a8a;color:#888}
.sb{background:#111;border-radius:6px;padding:6px 12px;display:flex;justify-content:space-between;font-size:11px;color:#666}
</style></head><body>
<div class="hd"><h1>CABANE MARCOUX</h1><div class="hd-right"><button class="mn-btn" onclick="tgMenu()" title="Menu">&#9776;</button><div class="dt w" id="dt"></div></div></div>
<div class="mn-panel" id="mnp"><div class="mn-title">Acc&egrave;s Remote &mdash; QR Code</div><div class="mn-qr"><img id="qrimg" src="" alt="QR"></div><div class="mn-url" id="qrurl"></div></div>
<div class="w">
<div class="r"><div class="cd dm"><div class="lb">Dompeur</div><div class="vl" id="dmp">--:--</div></div><div class="cd tp"><div class="lb">Temperature</div><div class="vl" id="tmp">--.-&deg;C</div></div></div>
<div class="gc"><div class="gl"><span>Tendance</span><span class="ar" id="ar"></span></div><canvas id="gr" height="90"></canvas></div>
<div class="bc"><div class="br"><span class="nl">Bassin 1</span><div class="bw"><div class="bf" id="bf1"></div></div><span class="pc" id="bp1">--%</span></div><div class="br"><span class="nl">Bassin 2</span><div class="bw"><div class="bf" id="bf2"></div></div><span class="pc" id="bp2">--%</span></div><div class="br"><span class="nl">Bassin 3</span><div class="bw"><div class="bf" id="bf3"></div></div><span class="pc" id="bp3">--%</span></div></div>
<div class="sl-wrap"><div class="sl-track" id="slt"><div class="sl-hint l">&#9654; VACUUM ON</div><div class="sl-hint r">VACUUM OFF &#9664;</div><div class="sl-hdl" id="slh">&#9889;</div></div></div>
<div class="sb"><span id="st">Connexion...</span><span>ID: <span id="did">---</span></span></div>
</div>
<div class="pin-ov" id="pino">
  <div class="pin-box">
    <div class="pin-ttl">Code NIP requis</div>
    <div class="pin-dots"><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
    <div class="pin-err" id="perr"></div>
    <div class="pin-pad">
      <button class="pk" onclick="pk(1)">1</button><button class="pk" onclick="pk(2)">2</button><button class="pk" onclick="pk(3)">3</button>
      <button class="pk" onclick="pk(4)">4</button><button class="pk" onclick="pk(5)">5</button><button class="pk" onclick="pk(6)">6</button>
      <button class="pk" onclick="pk(7)">7</button><button class="pk" onclick="pk(8)">8</button><button class="pk" onclick="pk(9)">9</button>
      <button class="pk del" onclick="pkd()">&#9003;</button><button class="pk" onclick="pk(0)">0</button><button class="pk mt"></button>
    </div>
    <button class="pin-cancel" onclick="cancelPin()">Annuler</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>
<script>
var c,id=new URLSearchParams(window.location.search).get("id")||"5ea48c",hist=[];
var vacOn=false,pinCode="",pendingState=null,slDrag=false,slStartX=0;
document.getElementById("did").textContent=id;

function slInit(){
  var hdl=document.getElementById("slh"),trk=document.getElementById("slt");
  hdl.style.left="4px";
  hdl.addEventListener("pointerdown",function(e){slDrag=true;slStartX=e.clientX;hdl.setPointerCapture(e.pointerId);e.preventDefault();});
  hdl.addEventListener("pointermove",function(e){
    if(!slDrag)return;
    var tw=trk.offsetWidth-56,base=vacOn?tw:4,np=Math.max(4,Math.min(tw,base+(e.clientX-slStartX)));
    hdl.style.transition="none";hdl.style.left=np+"px";
  });
  hdl.addEventListener("pointerup",function(e){
    if(!slDrag)return;slDrag=false;
    var tw=trk.offsetWidth-56,cur=parseInt(hdl.style.left)||4,mid=tw/2;
    if(!vacOn&&cur>mid)showPin(true);
    else if(vacOn&&cur<mid)showPin(false);
    else resetSlider();
  });
}

function resetSlider(){
  var hdl=document.getElementById("slh"),trk=document.getElementById("slt");
  hdl.style.transition="left .25s";
  hdl.style.left=(vacOn?trk.offsetWidth-56:4)+"px";
}

function updSlider(){
  var hdl=document.getElementById("slh"),trk=document.getElementById("slt");
  trk.className="sl-track"+(vacOn?" on":"");
  hdl.style.transition="left .3s";
  hdl.style.left=(vacOn?trk.offsetWidth-56:4)+"px";
}

function showPin(ns){pendingState=ns;pinCode="";updDots();document.getElementById("perr").textContent="";document.getElementById("pino").className="pin-ov show";}
function cancelPin(){document.getElementById("pino").className="pin-ov";resetSlider();}
function pk(d){if(pinCode.length>=3)return;pinCode+=d;updDots();if(pinCode.length===3)setTimeout(chkPin,150);}
function pkd(){if(pinCode.length>0){pinCode=pinCode.slice(0,-1);updDots();}}
function updDots(){for(var i=1;i<=3;i++)document.getElementById("pd"+i).className="pin-dot"+(pinCode.length>=i?" f":"");}
function chkPin(){
  if(pinCode==="777"){
    document.getElementById("pino").className="pin-ov";
    if(c&&c.connected)c.publish("cyd/"+id+"/cmd","toggle");
  }else{
    document.getElementById("perr").textContent="Code incorrect ✗";
    pinCode="";updDots();
    setTimeout(function(){document.getElementById("perr").textContent="";},1500);
    resetSlider();
  }
}

function sv(on){vacOn=on;updSlider();}
function sba(n,v){var l=parseInt(v)||0;var f=document.getElementById("bf"+n);f.style.width=l+"%";f.className="bf "+(l>=50?"h":l>=25?"m":"l");document.getElementById("bp"+n).textContent=l+"%"}
function dg(){var cv=document.getElementById("gr"),ctx=cv.getContext("2d"),dp=window.devicePixelRatio||1;cv.width=cv.offsetWidth*dp;cv.height=90*dp;ctx.scale(dp,dp);var W=cv.offsetWidth,H=90;ctx.clearRect(0,0,W,H);ctx.fillStyle="#111";ctx.fillRect(0,0,W,H);if(hist.length<2){ctx.fillStyle="#444";ctx.font="12px Arial";ctx.textAlign="center";ctx.fillText("En attente...",W/2,H/2+4);document.getElementById("ar").textContent="";return}var n=hist.length,mn=Math.min.apply(null,hist),mx=Math.max.apply(null,hist),rg=mx-mn;if(rg<10){mn-=5;mx+=5;rg=mx-mn}var p={l:30,r:8,t:6,b:14},cw=W-p.l-p.r,ch=H-p.t-p.b;ctx.strokeStyle="#2a2a4e";ctx.setLineDash([3,3]);for(var i=0;i<=2;i++){var y=p.t+ch*i/2;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+cw,y);ctx.stroke()}ctx.setLineDash([]);ctx.fillStyle="#556";ctx.font="9px monospace";ctx.textAlign="right";ctx.fillText(mx+"s",p.l-3,p.t+7);ctx.fillText(mn+"s",p.l-3,p.t+ch+3);ctx.lineWidth=2;ctx.lineJoin="round";for(var i=1;i<n;i++){var x1=p.l+(i-1)*cw/(n-1),y1=p.t+ch-(hist[i-1]-mn)*ch/rg,x2=p.l+i*cw/(n-1),y2=p.t+ch-(hist[i]-mn)*ch/rg;ctx.strokeStyle=hist[i]<=hist[i-1]?"#4f4":"#f44";ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke()}var a=document.getElementById("ar");if(hist[n-1]>hist[0]){a.textContent="▲";a.className="ar u"}else{a.textContent="▼";a.className="ar d"}}
function od(v){document.getElementById("dmp").textContent=v;var p=v.split(":");if(p.length===2){var s=parseInt(p[0])*60+parseInt(p[1]);if(s>0){hist.push(s);if(hist.length>30)hist.shift();dg()}}}
function ss(t,cl){document.getElementById("st").textContent=t;document.getElementById("dt").className="dt "+cl}
function tgMenu(){var p=document.getElementById("mnp");var open=p.classList.toggle("open");if(open&&!p.dataset.loaded){var url="https://robingag.github.io/cabane-marcoux/?id="+id;document.getElementById("qrurl").textContent=url;document.getElementById("qrimg").src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&format=png&data="+encodeURIComponent(url);p.dataset.loaded="1"}}
function go(){ss("Connexion...","w");var urls=["wss://broker.hivemq.com:8884/mqtt","ws://broker.hivemq.com:8000/mqtt"];var ui=0;function tc(){if(ui>=urls.length)ui=0;c=mqtt.connect(urls[ui],{clientId:"r-"+id+"-"+Math.random().toString(16).substr(2,4),clean:true,connectTimeout:8000,reconnectPeriod:0});c.on("connect",function(){ss("Connecte","ok");var p="cyd/"+id+"/";["state","dompeur","temp","basin1","basin2","basin3"].forEach(function(t){c.subscribe(p+t)})});c.on("message",function(tp,m){var v=m.toString(),p="cyd/"+id+"/";if(tp===p+"state")sv(v==="1");if(tp===p+"dompeur")od(v);if(tp===p+"temp")document.getElementById("tmp").innerHTML=v+"&deg;C";if(tp===p+"basin1")sba(1,v);if(tp===p+"basin2")sba(2,v);if(tp===p+"basin3")sba(3,v)});c.on("error",function(){ss("Essai...","w");c.end(true);ui++;setTimeout(tc,1000)});c.on("close",function(){ss("Deconnecte","er")})}tc()}
slInit();go();dg();document.addEventListener("visibilitychange",function(){if(!document.hidden&&(!c||!c.connected))go()});
</script></body></html>
